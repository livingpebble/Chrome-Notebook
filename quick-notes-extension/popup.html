<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QuickNotes</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header class="toolbar">
      <div class="toolbar-left">
        <button id="newNoteBtn" class="btn btn-icon btn-primary" title="新建笔记">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="12" y1="5" x2="12" y2="19"/>
            <line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
        </button>
      </div>
      <div class="toolbar-center">
        <div class="search-box">
          <input type="text" id="searchInput" placeholder="搜索笔记..." />
          <button id="searchBtn" class="btn btn-icon" title="搜索">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="11" cy="11" r="8"/>
              <path d="m21 21-4.35-4.35"/>
            </svg>
          </button>
        </div>
      </div>
      <div class="toolbar-right">
        <button id="exportBtn" class="btn btn-icon" title="导出笔记">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="17 8 12 3 7 8"/>
            <line x1="12" y1="3" x2="12" y2="15"/>
          </svg>
        </button>
        <button id="importBtn" class="btn btn-icon" title="导入笔记">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="7 10 12 15 17 10"/>
            <line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
        </button>
        <button id="refreshBtn" class="btn btn-icon" title="刷新">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="23 4 23 10 17 10"/>
            <polyline points="1 20 1 14 7 14"/>
            <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
          </svg>
        </button>
      </div>
    </header>

    <div class="main-content">
      <aside class="notes-sidebar">
        <div class="sidebar-header">
          <h3>笔记列表</h3>
          <button id="toggleSidebar" class="btn btn-icon" title="收起">◀</button>
        </div>
        <div class="notes-list" id="notesList">
          <div class="loading">加载中...</div>
        </div>
      </aside>
      
      <main class="editor-container" id="editorContainer">
        <div class="editor-header">
          <input type="text" id="noteTitle" class="note-title" placeholder="笔记标题" />
          <div class="editor-actions">
            <button id="saveBtn" class="btn btn-icon" title="保存笔记">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
                <polyline points="17 21 17 13 7 13 7 21"/>
                <polyline points="7 3 7 8 15 8"/>
              </svg>
            </button>
            <button id="deleteBtn" class="btn btn-icon" title="删除笔记">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="3 6 5 6 21 6"/>
                <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
              </svg>
            </button>
          </div>
        </div>
        
        <div class="editor-wrapper">
          <textarea id="noteEditor" placeholder="开始记录你的想法..."></textarea>
        </div>
        
        <div class="save-status" id="saveStatus">
          <span class="status-text">等待输入</span>
        </div>
      </main>
      
      <div class="empty-state" id="emptyState">
        <div class="empty-icon">📝</div>
        <h3>还没有笔记</h3>
        <p>点击左上角"新建"按钮创建第一个笔记</p>
      </div>
    </div>

    <footer class="status-bar">
      <div class="status-left">
        <span id="currentFile">未选择文件</span>
      </div>
      <div class="status-center">
        <span id="lastModified">-</span>
      </div>
      <div class="status-right">
        <span id="charCount">0 字符</span>
      </div>
    </footer>
  </div>

  <div class="modal" id="newNoteModal">
    <div class="modal-content">
      <div class="modal-header">
        <h3>创建新笔记</h3>
        <button class="modal-close" id="closeModal">&times;</button>
      </div>
      <div class="modal-body">
        <label for="newNoteName">文件名：</label>
        <input type="text" id="newNoteName" placeholder="输入文件名" />
        <p class="hint">文件名将作为txt文档的名称</p>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" id="cancelNewNote">取消</button>
        <button class="btn btn-primary" id="confirmNewNote">创建</button>
      </div>
    </div>
  </div>

  <div class="modal" id="deleteModal">
    <div class="modal-content modal-small">
      <div class="modal-header">
        <h3>确认删除</h3>
        <button class="modal-close" id="closeDeleteModal">&times;</button>
      </div>
      <div class="modal-body">
        <p>确定要删除这个笔记吗？</p>
        <p class="warning">此操作无法撤销</p>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" id="cancelDelete">取消</button>
        <button class="btn btn-danger" id="confirmDelete">删除</button>
      </div>
    </div>
  </div>

  <div class="modal" id="authModal">
    <div class="modal-content">
      <div class="modal-header">
        <h3>首次使用设置</h3>
      </div>
      <div class="modal-body">
        <p>请选择存放笔记的文件夹</p>
        <p class="hint">建议选择插件目录下的 notebooks 文件夹</p>
      </div>
      <div class="modal-footer">
        <button class="btn btn-primary" id="chooseDirectory">选择文件夹</button>
      </div>
    </div>
  </div>

  <script src="jszip.min.js"></script>
  <script src="popup.js"></script>
</body>
</html>
